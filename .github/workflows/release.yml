name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "'app/src-tauri -> target'"

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libpulse-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        working-directory: app
        run: npm run tauri build -- --bundles app,dmg
        # Build .app and DMG separately; DMG is best-effort (bundle_dmg.sh can
        # time out in CI). We always upload the zipped .app as a fallback.
        continue-on-error: true

      - name: Build .app only (macOS fallback)
        if: matrix.platform == 'macos'
        working-directory: app
        run: npm run tauri build -- --bundles app

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        working-directory: app
        run: npm run tauri build -- --bundles appimage,deb

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        working-directory: app
        run: npm run tauri build -- --bundles msi,nsis

      # ── macOS artifacts ──────────────────────────────────────────────────
      - name: Zip macOS .app
        if: matrix.platform == 'macos'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Locate the .app — it lands in the workspace-root target dir
          APP_BUNDLE=$(find . -name "Midium.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: Midium.app not found after build"
            find . -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          BUNDLE_DIR=$(dirname "$APP_BUNDLE")
          ZIP_NAME="Midium_${VERSION}_macos.app.zip"
          cd "$BUNDLE_DIR"
          zip -r --symlinks "$ZIP_NAME" Midium.app
          echo "APP_ZIP=${BUNDLE_DIR}/${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload macOS .app.zip
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: ${{ env.APP_ZIP }}

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "**/*.dmg"
          if-no-files-found: ignore   # DMG is best-effort

      # ── Linux artifacts ──────────────────────────────────────────────────
      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "**/*.AppImage"

      - name: Upload Linux .deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "**/*.deb"

      # ── Windows artifacts ────────────────────────────────────────────────
      - name: Upload Windows MSI
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: "**/*.msi"

      - name: Upload Windows installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: "**/*.exe"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body_path: .github/RELEASE_NOTES_TEMPLATE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
