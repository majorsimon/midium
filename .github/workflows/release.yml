name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libpulse-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      # ── macOS ────────────────────────────────────────────────────────────
      - name: Build macOS app + DMG (DMG is best-effort)
        if: matrix.platform == 'macos'
        working-directory: app
        run: npm run tauri build -- --bundles app,dmg
        continue-on-error: true

      - name: Build macOS app (ensure .app exists even if DMG failed)
        if: matrix.platform == 'macos'
        working-directory: app
        run: npm run tauri build -- --bundles app

      - name: Zip and upload macOS .app
        if: matrix.platform == 'macos'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP=$(find "$GITHUB_WORKSPACE" -name "Midium.app" -type d | head -1)
          [ -z "$APP" ] && { echo "Midium.app not found"; exit 1; }
          ZIP="$GITHUB_WORKSPACE/Midium_${VERSION}_macos.app.zip"
          cd "$(dirname "$APP")"
          zip -r --symlinks "$ZIP" Midium.app

      - name: Upload macOS .app.zip
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: ${{ github.workspace }}/Midium_*_macos.app.zip

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ github.workspace }}/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

      # ── Linux ────────────────────────────────────────────────────────────
      - name: Build Linux bundles
        if: matrix.platform == 'linux'
        working-directory: app
        run: npm run tauri build -- --bundles appimage,deb

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ${{ github.workspace }}/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux .deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ${{ github.workspace }}/target/release/bundle/deb/*.deb

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Build Windows bundles
        if: matrix.platform == 'windows'
        working-directory: app
        run: npm run tauri build -- --bundles msi,nsis

      - name: Stage Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\staging"
          # Find only bundle outputs — explicitly exclude build/ and deps/ directories
          $msi = Get-ChildItem -Recurse -Filter "*.msi" |
            Where-Object { $_.FullName -match "\\bundle\\msi\\" } |
            Select-Object -First 1
          $exe = Get-ChildItem -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\bundle\\nsis\\" } |
            Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName "$env:GITHUB_WORKSPACE\staging\" ; Write-Host "Staged: $($msi.Name)" }
          if ($exe) { Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\staging\" ; Write-Host "Staged: $($exe.Name)" }
          Get-ChildItem "$env:GITHUB_WORKSPACE\staging"

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ github.workspace }}/staging/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # flatten into a single dir for upload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body_path: .github/RELEASE_NOTES_TEMPLATE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
