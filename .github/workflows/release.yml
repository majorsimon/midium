name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libpulse-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Build app with Tauri
        working-directory: app
        run: npm run tauri build

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v3
        with:
          name: midium-macos-dmg
          path: app/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload macOS app (for direct distribution)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v3
        with:
          name: midium-macos-app
          path: app/src-tauri/target/release/bundle/macos/*.app

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v3
        with:
          name: midium-linux-appimage
          path: app/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux deb
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v3
        with:
          name: midium-linux-deb
          path: app/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Windows MSI
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v3
        with:
          name: midium-windows-msi
          path: app/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows EXE
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v3
        with:
          name: midium-windows-exe
          path: app/src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
