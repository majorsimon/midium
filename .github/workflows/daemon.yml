name: Daemon Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  daemon:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev

      - name: Build daemon
        working-directory: crates/midium-daemon
        run: cargo build --release

      - name: Test daemon help
        run: cargo run --manifest-path crates/midium-daemon/Cargo.toml --release -- --help
